<!DOCTYPE html>
<html>
<head>
  <title>Kategorie – FixIt Service</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    .detail-page { min-height: 100vh; background: #020617; padding: 60px 0; }
    .detail-hero {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 40px;
    }
    .detail-icon {
      width: 90px;
      height: 90px;
      border-radius: 22px;
      background: rgba(232,83,28,0.15);
      color: #e8531c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      flex-shrink: 0;
    }
    .detail-hero h1 { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
    .detail-hero p { color: #94a3b8; margin: 0; font-size: 15px; }
    .detail-section {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 24px;
    }
    .detail-section h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .detail-section h3 i { color: #e8531c; }
    .detail-section p { color: #cbd5e1; font-size: 15px; line-height: 1.7; margin: 0; }
    .defekt-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .defekt-item {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #cbd5e1;
    }
    .defekt-item i { color: #e8531c; font-size: 16px; flex-shrink: 0; }
    .detail-btn-row { text-align: center; margin-top: 32px; }
    .btn-detail-submit {
      display: inline-block;
      background: linear-gradient(to right, #e8531c, #c2410c);
      border: none;
      border-radius: 14px;
      padding: 14px 40px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-detail-submit:hover { opacity: 0.9; transform: translateY(-1px); color: white; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #64748b;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .back-link:hover { color: #e8531c; }
    @media (max-width: 576px) {
      .defekt-grid { grid-template-columns: 1fr; }
      .detail-hero { flex-direction: column; text-align: center; }
    }
  </style>
</head>

<body class="bg-dark text-white">

document.addEventListener("DOMContentLoaded", () => {
  const isLoggedIn = localStorage.getItem("loggedIn") === "true";
  const userName   = localStorage.getItem("userName");
  const userRole   = localStorage.getItem("userRole");

  if (isLoggedIn) {
    document.getElementById("mainContent").classList.add("with-sidebar");
    const nameEl = document.getElementById("sidebarName");
    if (nameEl) nameEl.innerText = userName;
    const nameElAdmin = document.getElementById("sidebarNameAdmin");
    if (nameElAdmin) nameElAdmin.innerText = userName;

    if (userRole === "admin") {
      document.getElementById("sidebarAdmin").style.display = "flex";
    } else {
      document.getElementById("sidebarUser").style.display = "flex";
    }
  } else {
    document.getElementById("sidebarGuest").style.display = "flex";
    document.getElementById("mainContent").classList.add("with-sidebar");
  }

  const params = new URLSearchParams(window.location.search);
  const item = params.get("item");
  const data = itemData[item];

  if (!data) {
    document.getElementById("detailTitle").innerText = "Kategorie nicht gefunden";
    document.getElementById("detailSubtitle").innerText = "Bitte gehen Sie zurück und wählen Sie eine gültige Kategorie.";
    return;
  }

  document.getElementById("detailIcon").innerHTML = `<i class="bi ${data.icon}"></i>`;
  document.getElementById("detailTitle").innerText = data.title;
  document.getElementById("detailSubtitle").innerText = data.subtitle;
  document.getElementById("detailDescription").innerText = data.description;

  document.getElementById("detailDefekte").innerHTML = data.defekte.map(d => `
    <div class="defekt-item"><i class="bi bi-dot"></i><span>${d}</span></div>
  `).join("");

  document.getElementById("detailCreateBtn").href = "/create-request";
});
</script>

</html>
