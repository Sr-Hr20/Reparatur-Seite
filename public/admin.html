<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel – FixIt Service</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">

  <style>
    .admin-page { min-height: 100vh; background: #020617; padding: 40px 0; }
    .admin-table { background: #1e293b; border-radius: 16px; border: 1px solid #334155; overflow: hidden; }
    .admin-table table { width: 100%; border-collapse: collapse; }
    .admin-table th { background: #0f172a; padding: 14px 16px; color: #94a3b8; font-size: 13px; font-weight: 600; text-align: left; }
    .admin-table td { padding: 14px 16px; border-top: 1px solid #334155; font-size: 14px; vertical-align: middle; }
    .admin-table tr:hover td { background: rgba(255,255,255,0.02); }
    .tab-btn { background: #1e293b; border: none; color: #94a3b8; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: #e8531c; color: white; }
  </style>
</head>

<body class="bg-dark text-white">

<!-- ✅ SIDEBAR           Admin -->
<div id="sidebarAdmin" class="sidebar">
  <div class="sidebar-logo">
    <a href="/"><img src="/images/logo.png" style="width:140px;"></a>
  </div>
  <div class="sidebar-user">
    <div class="sidebar-avatar"><i class="bi bi-shield-lock-fill"></i></div>
    <div>
      <p id="sidebarNameAdmin" class="mb-0 fw-bold"></p>
      <small class="text-secondary">Admin</small>
    </div>
  </div>
  <hr style="border-color:#1e293b; margin: 16px 0;">
  <nav class="sidebar-nav">
    <a href="/admin" class="sidebar-link"><i class="bi bi-grid"></i> Dashboard</a>
    <a href="/admin?tab=nutzer" class="sidebar-link"><i class="bi bi-people"></i> Nutzer</a>
    <a href="/admin?tab=support" class="sidebar-link"><i class="bi bi-headset"></i> Support</a>
  </nav>
  <hr style="border-color:#1e293b; margin: 16px 0;">
  <div class="sidebar-bottom">
    <button onclick="logout()" class="sidebar-logout">
      <i class="bi bi-box-arrow-left"></i> Abmelden
    </button>
  </div>
</div>

<!-- ✅ MAIN CONTENT -->
<div class="main-content with-sidebar">
  <div class="admin-page">
    <div class="container">

      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="fw-bold">Admin Panel</h1>
          <p class="text-secondary mb-0">Übersicht aller Anfragen und Nutzer</p>
        </div>
      </div>

      <!-- Stats -->
      <div class="row g-4 mb-5" id="statRow">
        <div class="col-md-3">
          <div class="stat-box">
            <div class="d-flex align-items-center gap-2 mb-2">
              <div class="stat-icon blue"><i class="bi bi-graph-up"></i></div>
              <span class="text-secondary">Anfragen gesamt</span>
            </div>
            <h2 class="fw-bold" id="statGesamt">0</h2>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-box">
            <div class="d-flex align-items-center gap-2 mb-2">
              <div class="stat-icon yellow"><i class="bi bi-clock"></i></div>
              <span class="text-secondary">Offen</span>
            </div>
            <h2 class="fw-bold" id="statOffen">0</h2>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-box">
            <div class="d-flex align-items-center gap-2 mb-2">
              <div class="stat-icon blue"><i class="bi bi-people"></i></div>
              <span class="text-secondary">Nutzer</span>
            </div>
            <h2 class="fw-bold" id="statNutzer">0</h2>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-box">
            <div class="d-flex align-items-center gap-2 mb-2">
              <div class="stat-icon green"><i class="bi bi-check-circle"></i></div>
              <span class="text-secondary">Abgeschlossen</span>
            </div>
            <h2 class="fw-bold" id="statDone">0</h2>
          </div>
        </div>
      </div>


      <!-- Anfragen Tab -->
      <div id="tabAnfragen">
        <div class="admin-table">
          <table>
            <thead>
              <tr>
                <th>Titel</th>
                <th>Kategorie</th>
                <th>Nutzer</th>
                <th>Standort</th>
                <th>Datum</th>
                <th>Status</th>
                <th>Aktion</th>
              </tr>
            </thead>
            <tbody id="anfragenBody">
              <tr><td colspan="7" class="text-center text-secondary py-4">Laden...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Nutzer Tab -->
      <div id="tabNutzer" style="display:none;">
        <div class="admin-table">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>E-Mail</th>
                <th>Rolle</th>
              </tr>
            </thead>
            <tbody id="nutzerBody">
              <tr><td colspan="3" class="text-center text-secondary py-4">Laden...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Support Tab -->

      <div id="tabSupport" style="display:none;">
        <div class="admin-table">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>E-Mail</th>
                <th>Betreff</th>
                <th>Nachricht</th>
                <th>Datum</th>
                <th>Aktion</th>
              </tr>
            </thead>
            <tbody id="supportBody">
              <tr><td colspan="5" class="text-center text-secondary py-4">Laden...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  localStorage.removeItem("userName");
  localStorage.removeItem("userRole");
  window.location.href = "/";
}

// Schutz — nur Admin
const isLoggedIn = localStorage.getItem("loggedIn") === "true";
const userRole   = localStorage.getItem("userRole");
const userName   = localStorage.getItem("userName");

if (!isLoggedIn || userRole !== "admin") {
  window.location.href = "/login";
}

// Sidebar Name
document.getElementById("sidebarNameAdmin").innerText = userName;

function showTab(tab) {
  document.getElementById("tabAnfragen").style.display = tab === "nutzer" || tab === "support" ? "none" : "block";
  document.getElementById("tabNutzer").style.display   = tab === "nutzer"  ? "block" : "none";
  document.getElementById("tabSupport").style.display  = tab === "support" ? "block" : "none";
  document.getElementById("statRow").style.display     = tab === "nutzer" || tab === "support" ? "none" : "flex";
}
async function loadData() {
  // Anfragen laden
  const resA = await fetch("/api/admin/requests");
  const anfragen = await resA.json();

  document.getElementById("statGesamt").innerText = anfragen.length;
  document.getElementById("statOffen").innerText  = anfragen.filter(r => r.status === "offen").length;
  document.getElementById("statDone").innerText   = anfragen.filter(r => r.status === "abgeschlossen").length;

  const tbody = document.getElementById("anfragenBody");

  if (anfragen.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-center text-secondary py-4">Keine Anfragen vorhanden</td></tr>`;
  } else {
    tbody.innerHTML = anfragen.map(r => `
      <tr>
        <td><strong>${r.title}</strong></td>
        <td><span class="badge-category">${r.category}</span></td>
        <td>${r.user}</td>
        <td>${r.location || "—"}</td>
        <td>${r.date}</td>
        <td>
          <span class="badge-status ${r.status === 'offen' ? 'status-offen' : r.status === 'abgeschlossen' ? 'status-done' : 'status-progress'}">
            ${r.status}
          </span>
        </td>
        <td>
          <select onchange="changeStatus(${r.id}, this.value)" class="form-select form-select-sm" style="background:#0f172a; color:white; border-color:#334155; width:150px;">
            <option ${r.status === 'offen' ? 'selected' : ''}>offen</option>
            <option ${r.status === 'in Bearbeitung' ? 'selected' : ''}>in Bearbeitung</option>
            <option ${r.status === 'abgeschlossen' ? 'selected' : ''}>abgeschlossen</option>
          </select>
        </td>
      </tr>
    `).join("");
  }

  // Nutzer laden
  const resU = await fetch("/api/admin/users");
  const nutzer = await resU.json();

  document.getElementById("statNutzer").innerText = nutzer.length;

  const tbodyN = document.getElementById("nutzerBody");
  if (nutzer.length === 0) {
    tbodyN.innerHTML = `<tr><td colspan="3" class="text-center text-secondary py-4">Keine Nutzer</td></tr>`;
  } else {
    tbodyN.innerHTML = nutzer.map(u => `
      <tr>
        <td><strong>${u.firstname}</strong></td>
        <td>${u.email}</td>
        <td>
          <span class="badge-status ${u.role === 'admin' ? 'status-done' : 'status-offen'}">
            ${u.role}
          </span>
        </td>
      </tr>
    `).join("");
  }
  // Support laden
  const resS = await fetch("/api/support");
  const support = await resS.json();
  const tbodyS = document.getElementById("supportBody");
  if (support.length === 0) {
    tbodyS.innerHTML = `<tr><td colspan="5" class="text-center text-secondary py-4">Keine Support-Anfragen</td></tr>`;
  } else {
    tbodyS.innerHTML = support.map(s => `
    <tr>
      <td><strong>${s.name}</strong></td>
      <td>${s.email}</td>
      <td><span class="badge-category">${s.betreff}</span></td>
      <td>${s.nachricht}</td>
      <td>${s.datum}</td>
      <td>
        <button onclick="toggleAntwort(${s.id})" class="btn btn-sm" style="background:rgba(232,83,28,0.15); color:#e8531c; border:1px solid #e8531c; border-radius:8px;">
          <i class="bi bi-send-fill me-1"></i>Antworten
        </button>
        <div id="antwort-${s.id}" style="display:none; margin-top:8px;">
          <textarea id="text-${s.id}" class="form-control mb-2" rows="2" placeholder="Ihre Antwort..." style="background:#0f172a; color:white; border-color:#334155;"></textarea>
          <button onclick="sendAntwort(${s.id}, '${s.email}', '${s.name}', '${s.betreff}')" class="btn btn-sm btn-primary">
            <i class="bi bi-send me-1"></i>Senden
          </button>
        </div>
      </td>
    </tr>
  `).join("");
  }
}

async function changeStatus(id, status) {
  await fetch("/api/admin/status", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id, status })
  });
  loadData();
}



// Aktiver Sidebar-Link
const fullPath = window.location.pathname + window.location.search;
document.querySelectorAll(".sidebar-link").forEach(link => {
  link.classList.remove("active");
  if (link.getAttribute("href") === fullPath) {
    link.classList.add("active");
  }
});

// URL-Parameter prüfen
const params = new URLSearchParams(window.location.search);
if (params.get("tab") === "nutzer") {
  showTab("nutzer");
} else if (params.get("tab") === "support") {
  showTab("support");
} else {
  showTab("dashboard");
}

function toggleAntwort(id) {
  const div = document.getElementById("antwort-" + id);
  div.style.display = div.style.display === "none" ? "block" : "none";
}

async function sendAntwort(id, email, name, betreff) {
  const text = document.getElementById("text-" + id).value.trim();
  if (!text) { alert("Bitte eine Antwort eingeben!"); return; }

  const res = await fetch("/api/support/antwort", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, name, betreff, antwort: text })
  });

  if (res.ok) {
    alert("✅ Antwort gesendet!");
    document.getElementById("antwort-" + id).style.display = "none";
  } else {
    alert("❌ Fehler beim Senden!");
  }
}

loadData();


</script>

</body>
</html>
