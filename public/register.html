<!DOCTYPE html>
<html>
<head>
  <title>Registrieren</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>

    body {
      background: #020617;
      color: white;
      margin: 0;
    }

    /* ✅ Zentrierung */
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* ✅ Card */
    .auth-card {
      background: #0f172a;
      padding: 40px;
      border-radius: 20px;
      width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    /* ✅ Logo */
    .logo {
      width: 40px;
    }

    /* ✅ Inputs */
    .input-group-text {
      background: #1e293b;
      border: none;
      color: #94a3b8;
    }

    .form-control {
      background: #1e293b;
      border: none;
      color: white;
    }

    .form-control::placeholder {
      color: #64748b;
    }

    /* ✅ Button */
    .btn-primary {
      background: #3b82f6;
      border: none;
      border-radius: 12px;
      padding: 10px;
    }

    /* ✅ Link */
    .link {
      color: #3b82f6;
      text-decoration: none;
    }
    .role-option {
      flex: 1;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 10px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .role-option i {
      font-size: 18px;
      display: block;
      margin-bottom: 6px;
    }

    .role-option:hover { border-color: #e8531c; }

    .role-option.selected {
      border-color: #e8531c;
      background: rgba(232,83,28,0.15);
      color: #e8531c;
    }
  </style>

</head>

<body>

<div class="auth-container">

  <div class="auth-card">

    <!-- ✅ Logo -->
    <div class="text-center mb-4">
      <a href="/"><img src="images/logo.png" style="width: 180px;"></a>
      <h3 class="mt-3">Konto erstellen</h3>
    </div>

    <form id="registerForm">

      <!-- Name -->
      <label>Name</label>
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" id="firstname" class="form-control" placeholder="Max Mustermann">
      </div>

      <!-- Email -->
      <label>E-Mail</label>
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input type="email" id="email" class="form-control" placeholder="ihre@email.de">
      </div>

      <!-- Passwort -->
      <label>Passwort</label>
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-eye"></i></span>
        <input type="password" id="password" class="form-control" placeholder="********">
      </div>

      <!-- Passwort bestätigen -->
      <label>Passwort bestätigen</label>
      <div class="input-group mb-4">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" id="password2" class="form-control" placeholder="********">
      </div>
      
      <!-- Rolle auswählen -->
      <div class="mb-4">
        <label class="d-block mb-2">Ich bin...</label>
        <div class="d-flex gap-3">
          <div class="role-option selected" onclick="selectRole('kunde', this)" id="roleKunde">
            <i class="bi bi-person"></i>
            <span>Kunde</span>
          </div>
          <div class="role-option" onclick="selectRole('admin', this)" id="roleAdmin">
            <i class="bi bi-shield-lock"></i>
            <span>Admin</span>
          </div>
        </div>
        <input type="hidden" id="role" value="kunde">
      </div>


      <button class="btn btn-primary w-100">Registrieren</button>

    </form>
    <p class="text-center mt-3">
        Bereits ein Konto? 
        <a href="/login" class="link">Jetzt anmelden</a>
    </p>


  </div>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    firstname: document.getElementById("firstname").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    password2: document.getElementById("password2").value,
    role: document.getElementById("role").value
  };

  if (Object.values(data).some(v => !v)) {
    alert("Bitte alle Felder ausfüllen!");
    return;
  }

  if (data.password !== data.password2) {
    alert("Passwörter stimmen nicht!");
    return;
  }

  const res = await fetch("/api/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  if (res.ok) {
    alert("✅Registrierung erfolgreich!");
    window.location.href = "/login";
  } else {
    alert("❌ Fehler!");
  }

});


function selectRole(role, el) {
  document.querySelectorAll(".role-option").forEach(o => o.classList.remove("selected"));
  el.classList.add("selected");
  document.getElementById("role").value = role;
}

</script>

</body>
</html>
