<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta charset="UTF-8">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>

    body {
      background: #020617;
      color: white;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* ✅ Zentriert */
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* ✅ Card */
    .auth-card {
      width: 420px;
      text-align: center;
    }

    /* ✅ Logo */
    .logo {
      width: 50px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 32px;
      font-weight: bold;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    /* ✅ Input Box */
    .input-box {
      background: #1e293b;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .input-box i {
      color: #94a3b8;
      margin-right: 10px;
    }

    .input-box input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      width: 100%;
    }

    /* ✅ Eye Icon */
    .eye {
      cursor: pointer;
      margin-left: 10px;
    }

    /* ✅ Button */
    .btn-login {
      width: 100%;
      background: linear-gradient(to right, #3b82f6, #2563eb);
      border: none;
      padding: 14px;
      border-radius: 12px;
      color: white;
      font-size: 16px;
    }

    /* ✅ Bottom Link */
    .bottom-text {
      margin-top: 20px;
      color: #94a3b8;
    }

    .bottom-text a {
      color: #3b82f6;
      text-decoration: none;
    }

  </style>

</head>

<body>

<div class="auth-container">

  <div class="auth-card">

    <!-- ✅ Logo + Titel -->
    <a href="/">
      <img src="images/logo.png" style="width: 180px;" class="logo">
    </a>

    <h1>Willkommen zurück</h1>
    <p class="subtitle">Melden Sie sich bei Ihrem Konto an</p>

    <form id="loginForm">

      <!-- ✅ Email -->
      <label class="text-start d-block mb-1">E-Mail</label>
      <div class="input-box">
        <i class="bi bi-envelope"></i>
        <input type="email" id="email" placeholder="ihre@email.de">
      </div>

      <!-- ✅ Passwort -->
      <label class="text-start d-block mb-1">Passwort</label>
      <div class="input-box">
        <i class="bi bi-lock"></i>
        <input type="password" id="password" placeholder="********">
        <i class="bi bi-eye eye" onclick="togglePassword()"></i>
      </div>

      <!-- ✅ Button -->
      <button class="btn-login">Anmelden</button>

    </form>

    <p class="bottom-text">
      Noch kein Konto?
      <a href="/register">Jetzt registrieren</a>
    </p>

  </div>

</div>

<script>

/* ✅ Passwort anzeigen/verstecken */
function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}

/* ✅ LOGIN */
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Bitte alle Felder ausfüllen!");
    return;
  }

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  if (res.ok) {

    const data = await res.json();
   
    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("userName", data.firstname.charAt(0).toUpperCase() + data.firstname.slice(1));

    window.location.href = "/dashboard";
  } else {
    alert("❌ E-Mail oder Passwort falsch!");
  }

});

</script>

</body>
</html>
