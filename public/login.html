<!DOCTYPE html>
<html>
<head>
  <title>Login – FixIt Service</title>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: #020617;
      color: white;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .auth-card {
      width: 420px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      font-weight: bold;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .input-box {
      background: #1e293b;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      border: 1px solid #334155;
      transition: border 0.2s;
    }

    .input-box:focus-within {
      border-color: #e8531c;
    }

    .input-box i {
      color: #94a3b8;
      margin-right: 10px;
    }

    .input-box input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      width: 100%;
    }

    .eye {
      cursor: pointer;
      margin-left: 10px;
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(to right, #e8531c, #c2410c);
      border: none;
      padding: 14px;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-login:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .bottom-text {
      margin-top: 20px;
      color: #94a3b8;
    }

    .bottom-text a {
      color: #e8531c;
      text-decoration: none;
    }

    /* Fehler Box */
    #errorMsg {
      display: none;
      background: rgba(239,68,68,0.15);
      border: 1px solid #ef4444;
      border-radius: 12px;
      padding: 12px;
      color: #ef4444;
      margin-bottom: 16px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="auth-container">
  <div class="auth-card">

    <!-- Logo -->

    <a href="/">
        <img src="images/logo.png" style="width: 280px; margin-bottom: 40px; margin-top: 40px; display: block; margin-left: auto; margin-right: auto;">
    </a>

    <h1>Willkommen zurück</h1>
    <p class="subtitle">Melden Sie sich bei Ihrem Konto an</p>

    <!-- Fehler -->
    <div id="errorMsg">
      <i class="bi bi-x-circle me-2"></i>
      E-Mail oder Passwort falsch!
    </div>

    <form id="loginForm">

      <label class="text-start d-block mb-1">E-Mail</label>
      <div class="input-box">
        <i class="bi bi-envelope"></i>
        <input type="email" id="email" placeholder="ihre@email.de">
      </div>

      <label class="text-start d-block mb-1">Passwort</label>
      <div class="input-box">
        <i class="bi bi-lock"></i>
        <input type="password" id="password" placeholder="********">
        <i class="bi bi-eye eye" onclick="togglePassword()"></i>
      </div>

      <button class="btn-login">Anmelden</button>

    </form>

    <p class="bottom-text">
      Noch kein Konto?
      <a href="/register">Jetzt registrieren</a>
    </p>

  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById("password");
  input.type = input.type === "password" ? "text" : "password";
}

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email    = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    document.getElementById("errorMsg").style.display = "block";
    document.getElementById("errorMsg").innerHTML = '<i class="bi bi-x-circle me-2"></i>Bitte alle Felder ausfüllen!';
    return;
  }

  const res = await fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  if (res.ok) {
    const data = await res.json();
    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("userName", data.firstname.charAt(0).toUpperCase() + data.firstname.slice(1));
    localStorage.setItem("userRole", data.role);
    window.location.href = "/";
  } else {
    const err = document.getElementById("errorMsg");
    err.style.display = "block";
    err.innerHTML = '<i class="bi bi-x-circle me-2"></i>E-Mail oder Passwort falsch!';
  }
});
</script>

</body>
</html>
