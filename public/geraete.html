<!-- JS -->
<script>
function logout() {
  localStorage.removeItem("loggedIn");
  localStorage.removeItem("userName");
  window.location.href = "/";
}

function toggleSidebar() {
  const overlay = document.getElementById("overlay");
  const sidebar = document.querySelector(".sidebar.open") || document.querySelector(".sidebar");
  if (!sidebar) return;

  const isOpen = sidebar.classList.toggle("open");
  overlay.style.display = isOpen ? "block" : "none";
}

document.addEventListener("DOMContentLoaded", () => {
  const isLoggedIn = localStorage.getItem("loggedIn") === "true";
  const userRole = localStorage.getItem("userRole");
  const userName = localStorage.getItem("userName");

  if (isLoggedIn) {
    document.getElementById("mainContent").classList.add("with-sidebar");

    if (userRole === "admin") {
      document.getElementById("sidebarAdmin").style.display = "flex";
      document.getElementById("sidebarNameAdmin").innerText = userName;
    } else {
      document.getElementById("sidebarUser").style.display = "flex";
      document.getElementById("sidebarName").innerText = userName;
    }
  } else {
    document.getElementById("sidebarGuest").style.display = "flex";
  }
});
</script>
